// ─── CALC HELPERS ────────────────────────────────────────────────────────
function useCalcs(D) {
  const mEq=r=>(r.freq==="yearly"?(r.amt||0)/12:(r.amt||0));
  const totIn = D.income.reduce((s,r)=>s+mEq(r),0);
  const totFix = D.fixed.reduce((s,r)=>s+mEq(r),0);
  const totVar = D.variable.reduce((s,r)=>s+mEq(r),0);
  const totOut = totFix+totVar;
  const net = totIn-(totOut+D.savings);
  const savRate = totIn>0?Math.round(D.savings/totIn*100):0;
  const liqGoal = D.expense*D.mult;
  const liqGap = Math.max(0,liqGoal-D.saved);
  const liqPct = liqGoal>0?Math.min(100,Math.round(D.saved/liqGoal*100)):0;
  const protLife = Object.values(D.lifeIns).filter(v=>v>0).length;
  const protNl = Object.values(D.nonLife).filter(v=>v>0).length;
  const protTot = protLife+protNl;
  const ca = calcAge(D.dob)||35;
  const ytr = Math.max(0,(D.retAge||60)-ca);
  const yir = Math.max(0,(D.lifeExp||85)-(D.retAge||60));
  const inf=(D.infl||3)/100,ra2=(D.retAfter||3)/100,rb=(D.retBefore||6)/100;
  const fm=(D.monthlyNeed||0)*Math.pow(1+inf,ytr);
  let needed=0; if(ra2>0&&yir>0) needed=fm*12*(1-Math.pow(1+ra2,-yir))/ra2;
  let prepFV=0; D.retAssets.forEach(a=>{const pv=a.cv||0,r=(a.rr||0)/100;prepFV+=pv*Math.pow(1+r,ytr);});
  const retGap=Math.max(0,needed-prepFV);
  const mSave=(rb>0&&ytr>0)?retGap*(rb/12)/(Math.pow(1+rb/12,ytr*12)-1):(ytr>0?retGap/(ytr*12):0);
  const m4=retGap>0?retGap*(0.04/12)/(Math.pow(1+0.04/12,ytr*12)-1):0;
  const m8=retGap>0?retGap*(0.08/12)/(Math.pow(1+0.08/12,ytr*12)-1):0;
  // ── cross-page derived figures ──
  let eduTotal=0;
  (D.children||[]).forEach((ch,ci)=>{const cAge=parseInt(ch.a)||0;const ed=(D.eduData&&D.eduData[ci])||[];EDU_LEVELS.forEach((l,li)=>{const y=Math.max(0,l.sa-cAge),cost=ed[li]?.cost||0;eduTotal+=cost*l.y*Math.pow(1.06,y);});});
  const annualIncome=totIn*12;
  const suggCover=annualIncome*10;            // income-replacement: 10× annual income
  const suggCoverTotal=suggCover+eduTotal;    // + children's education funding
  const cfExpense=Math.round(totOut);          // monthly expense from Cash Flow
  return {totIn,totFix,totVar,totOut,net,savRate,liqGoal,liqGap,liqPct,protLife,protNl,protTot,ca,ytr,yir,fm,needed,prepFV,retGap,mSave,m4,m8,rb,eduTotal,annualIncome,suggCover,suggCoverTotal,cfExpense};
}

// THB formatted input — shows xx,xxx live as user types, stores raw number
function Input({value,onChange,type="number",placeholder="0",style={},suffix}) {
  const [focused,setFocused]=useState(false);
  const [display,setDisplay]=useState(value>0?value.toLocaleString("th-TH"):"");

  useEffect(()=>{if(!focused)setDisplay(value>0?Math.round(value).toLocaleString("th-TH"):"");},[value,focused]);

  const isTHB = type==="number";

  const handleChange=(e)=>{
    if(!isTHB){onChange(e.target.value);return;}
    const raw=e.target.value.replace(/,/g,"");
    if(raw===""||raw==="-"){setDisplay(raw);onChange(0);return;}
    const num=parseFloat(raw);
    if(isNaN(num)){return;}
    setDisplay(num.toLocaleString("th-TH"));
    onChange(Math.round(num));
  };

  const handleFocus=()=>{
    setFocused(true);
    if(isTHB&&value>0)setDisplay(value.toString());
  };

  const handleBlur=()=>{
    setFocused(false);
    if(isTHB)setDisplay(value>0?Math.round(value).toLocaleString("th-TH"):"");
  };

  return (
    <div style={{position:"relative"}}>
      <input
        type="text"
        inputMode={isTHB?"numeric":"text"}
        value={isTHB?display:(value||"")}
        placeholder={isTHB?"0":placeholder}
        onChange={handleChange}
        onFocus={handleFocus}
        onBlur={handleBlur}
        style={{...s.input,paddingRight:suffix?28:12,border:focused?"1px solid #3B82F6":"1px solid #E5E7EB",boxShadow:focused?"0 0 0 3px rgba(59,130,246,.12)":"none",textAlign:isTHB?"right":"left",...style}}/>
      {suffix&&<span style={{position:"absolute",right:9,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"#8A9A8A",pointerEvents:"none"}}>{suffix}</span>}
    </div>
  );
}

const LIFE_F=[{k:"sum",lbl:"ทุนประกัน / Sum insured",b:1000000},{k:"room",lbl:"ค่าห้อง / Room",b:5000},{k:"treat",lbl:"ค่ารักษา / Treatment",b:300000},{k:"critical",lbl:"โรคร้ายแรง / Critical illness",b:500000}];
const NL_F=[{k:"acc",lbl:"อุบัติเหตุ / Accident",b:200000},{k:"comp",lbl:"ค่าชดเชย / Compensation",b:1000}];
function gStatus(v,b){const r=v/b;if(r>=0.8)return{lbl:"สมบูรณ์",col:C.teal,pct:100};if(r>=0.3)return{lbl:"ควรเพิ่ม",col:"#D4941A",pct:Math.round(r*100)};return{lbl:"ยังไม่มี",col:C.red,pct:Math.round(r*100)};}
function GaugeBlock({label,value,onChange,bench}) {
  const st=gStatus(value,bench);
  return <div style={{marginBottom:12}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 150px",gap:".625rem",alignItems:"center",marginBottom:4}}>
      <label style={{...s.label,margin:0}}>{label}</label>
      <Input value={value} onChange={onChange} suffix="฿" style={{textAlign:"right"}}/>
    </div>
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <GaugeBar pct={st.pct} color={st.col}/>
      <span style={{fontSize:10,padding:"2px 7px",borderRadius:10,fontWeight:600,background:st.col==="var(--teal)"||st.col===C.teal?C.tealLight:st.col==="#D4941A"?C.amberLight:C.redLight,color:st.col,whiteSpace:"nowrap"}}>{st.lbl}</span>

function CFDonut({income,expenses,savings}) {
  const net=Math.max(0,income-(expenses+savings));
  const total=income||1;
  const R=52,cx=65,cy=65,circ=2*Math.PI*R;
  const expP=expenses/total,savP=savings/total,remP=net/total;
  const d1=expP*circ,d2=savP*circ,d3=remP*circ;
  return <svg viewBox="0 0 130 130" width={130} height={130} style={{display:"block",margin:"0 auto"}}>
    <circle cx={cx} cy={cy} r={R} fill="none" stroke="#F3F4F6" strokeWidth={20}/>
    {income>0&&<>
      <circle cx={cx} cy={cy} r={R} fill="none" stroke="#1F2937" strokeWidth={20} strokeDasharray={`${d1} ${circ-d1}`} strokeDashoffset={0} transform={`rotate(-90 ${cx} ${cy})`}/>
      <circle cx={cx} cy={cy} r={R} fill="none" stroke="#93C5FD" strokeWidth={20} strokeDasharray={`${d2} ${circ-d2}`} strokeDashoffset={-d1} transform={`rotate(-90 ${cx} ${cy})`}/>
      <circle cx={cx} cy={cy} r={R} fill="none" stroke="#D1D5DB" strokeWidth={20} strokeDasharray={`${d3} ${circ-d3}`} strokeDashoffset={-(d1+d2)} transform={`rotate(-90 ${cx} ${cy})`}/>
    </>}
    <text x={cx} y={cy-7} textAnchor="middle" fontSize={9} fill="#9CA3AF" fontFamily="Kanit,sans-serif">Total</text>
    <text x={cx} y={cy+10} textAnchor="middle" fontSize={13} fill="#111827" fontFamily="Kanit,sans-serif" fontWeight="700">{fmtM(income)}</text>

// ─── THAI PROGRESSIVE TAX ───────────────────────────────────────────────
function calcThaiTax(annualIncome) {
  // No deductions — raw income vs brackets
  const brackets = [
    { min:0,       max:150000,  rate:0   },
    { min:150000,  max:300000,  rate:0.05 },
    { min:300000,  max:500000,  rate:0.10 },
    { min:500000,  max:750000,  rate:0.15 },
    { min:750000,  max:1000000, rate:0.20 },
    { min:1000000, max:2000000, rate:0.25 },
    { min:2000000, max:5000000, rate:0.30 },
    { min:5000000, max:Infinity,rate:0.35 },
  ];

  let tax = 0;
  let topRate = 0;
  for (const b of brackets) {
    if (annualIncome <= b.min) break;
    const portion = Math.min(annualIncome, b.max) - b.min;
    tax += portion * b.rate;
    if (b.rate > 0 && annualIncome > b.min) topRate = b.rate;
  }
  return { tax, topRate, taxable: annualIncome };
}

function DonutChart({income,expenses,savings}) {
  const net=Math.max(0,income-(expenses+savings));
  const total=income||1;
  const expP=expenses/total,savP=savings/total,remP=net/total;
  const R=46,cx=60,cy=60,circ=2*Math.PI*R;
  const d1=expP*circ,d2=savP*circ,d3=remP*circ;
  return <svg viewBox="0 0 120 120" width={110} height={110} style={{display:"block",margin:"0 auto"}}>
    <circle cx={cx} cy={cy} r={R} fill="none" stroke={C.navyLight} strokeWidth={18}/>
    {income>0&&<>
      <circle cx={cx} cy={cy} r={R} fill="none" stroke="#C04040" strokeWidth={18} strokeDasharray={`${d1} ${circ-d1}`} strokeDashoffset={0} transform={`rotate(-90 ${cx} ${cy})`}/>
      <circle cx={cx} cy={cy} r={R} fill="none" stroke={C.teal} strokeWidth={18} strokeDasharray={`${d2} ${circ-d2}`} strokeDashoffset={-d1} transform={`rotate(-90 ${cx} ${cy})`}/>
      <circle cx={cx} cy={cy} r={R} fill="none" stroke="#7AAED8" strokeWidth={18} strokeDasharray={`${d3} ${circ-d3}`} strokeDashoffset={-(d1+d2)} transform={`rotate(-90 ${cx} ${cy})`}/>
    </>}
    <text x={cx} y={cy-5} textAnchor="middle" fontSize={9} fill={C.navy} fontFamily="Sarabun,sans-serif">เหลือ</text>
    <text x={cx} y={cy+10} textAnchor="middle" fontSize={12} fill={C.navy} fontFamily="Sarabun,sans-serif" fontWeight="700">{fmtM(net)}</text>
  </svg>;
}

function buildPDF(D) {
  const {totIn,totOut,net,savRate,liqGoal,liqGap,liqPct,protTot,retGap,prepFV,needed,ytr,yir,fm,ca}=(() => {
    const mEqP=r=>(r.freq==="yearly"?(r.amt||0)/12:(r.amt||0));
    const totIn=D.income.reduce((s,r)=>s+mEqP(r),0);
    const totFix=D.fixed.reduce((s,r)=>s+mEqP(r),0);
    const totVar=D.variable.reduce((s,r)=>s+mEqP(r),0);
    const totOut=totFix+totVar;
    const net=totIn-(totOut+D.savings);
    const savRate=totIn>0?Math.round(D.savings/totIn*100):0;
    const liqGoal=D.expense*D.mult;
    const liqGap=Math.max(0,liqGoal-D.saved);
    const liqPct=liqGoal>0?Math.min(100,Math.round(D.saved/liqGoal*100)):0;
    const protLife=Object.values(D.lifeIns).filter(v=>v>0).length;
    const protNl=Object.values(D.nonLife).filter(v=>v>0).length;
    const protTot=protLife+protNl;
    const ca=calcAge(D.dob)||35;
    const ytr=Math.max(0,(D.retAge||60)-ca);
    const yir=Math.max(0,(D.lifeExp||85)-(D.retAge||60));
    const inf=(D.infl||3)/100,ra2=(D.retAfter||3)/100,rb=(D.retBefore||6)/100;
    const fm=(D.monthlyNeed||0)*Math.pow(1+inf,ytr);
    let needed=0;if(ra2>0&&yir>0)needed=fm*12*(1-Math.pow(1+ra2,-yir))/ra2;
    let prepFV=0;D.retAssets.forEach(a=>{prepFV+=(a.cv||0)*Math.pow(1+(a.rr||0)/100,ytr);});
    const retGap=Math.max(0,needed-prepFV);
    const rb2=(D.retBefore||6)/100;
    const mSave=(rb2>0&&ytr>0)?retGap*(rb2/12)/(Math.pow(1+rb2/12,ytr*12)-1):0;
    return{totIn,totOut,net,savRate,liqGoal,liqGap,liqPct,protTot,retGap,prepFV,needed,ytr,yir,fm,ca,mSave};
  })();

  const rb=(D.retBefore||6)/100;
  const mSave=(rb>0&&ytr>0)?retGap*(rb/12)/(Math.pow(1+rb/12,ytr*12)-1):0;

  if(!liqOk)nextSteps.push({th:`เพิ่มเงินสำรองให้ครบ ${D.mult}x`,en:`Build emergency fund to ${D.mult}× monthly expenses`,sub:`ขาดอีก ${fM(liqGap)} ฿`});
  if(!protOk)nextSteps.push({th:"เพิ่มความคุ้มครองประกันชีวิตและสุขภาพ",en:"Increase life & health insurance coverage",sub:"ทุนประกันควรอยู่ที่ 10× รายได้ต่อปี"});
  if(retGap>0)nextSteps.push({th:`ออมเพื่อเกษียณ ${f(mSave)} ฿/เดือน`,en:`Save ${f(mSave)} ฿/mo at ${D.retBefore||6}% return`,sub:`ขาดอีก ${fM(retGap)} ฿`});

function openPDF(D) {
  const html=buildPDF(D);
  const w=window.open("","_blank");
  if(w){w.document.write(html);w.document.close();}
}


// ─── SHARE VIEW SCREEN (mobile read-only) ────────────────────────────────
function ShareViewScreen() {
  const [D,setD]=useState(null);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState("");
  const [cfOpen,setCfOpen]=useState(false);

  // ── Viewer identity (must match client_info.email) ──
  const [viewer,setViewer]=useState(null);
  const [authChecked,setAuthChecked]=useState(false);
  const [loggingIn,setLoggingIn]=useState(false);
  const [denied,setDenied]=useState(false);

  // ── Listen for the viewer's Google login (re-uses the app's auth instance) ──
  useEffect(()=>{
    if(DEV_MODE){setViewer({email:"dev@local"});setAuthChecked(true);return;}
    const unsub=auth.onAuthStateChanged(u=>{setViewer(u);setAuthChecked(true);});
    return ()=>unsub();
  },[]);

  const loginAsClient=async()=>{
    setLoggingIn(true);
    try{await auth.signInWithPopup(googleProvider);}
    catch(e){setLoggingIn(false);}
  };

  // ── Fetch the client doc only once we know who the viewer is ──
  useEffect(()=>{
    if(!authChecked) return;
    if(!viewer){setLoading(false);return;} // waiting for sign-in
    if(!SHARE_UID||!SHARE_CID){setError("Link ไม่ถูกต้อง");setLoading(false);return;}
    setLoading(true);
    db.collection("advisors").doc(SHARE_UID).collection("clients").doc(SHARE_CID).get()
      .then(doc=>{
        if(!doc.exists){setError("ไม่พบข้อมูล หรือ Link หมดอายุ");setLoading(false);return;}
        const data={id:doc.id,...doc.data()};
        const clientEmail=(data.email||"").trim().toLowerCase();
        const viewerEmail=(viewer.email||"").trim().toLowerCase();
        if(!DEV_MODE && (!clientEmail||clientEmail!==viewerEmail)){
          setDenied(true);setLoading(false);return;
        }
        setD(data);setLoading(false);
      }).catch(()=>{setError("ไม่สามารถโหลดข้อมูลได้ — อีเมลของคุณอาจไม่ตรงกับที่ Advisor บันทึกไว้");setLoading(false);});
  },[authChecked,viewer]);

  // ── Gate 1: not signed in yet → ask viewer to sign in with their email ──
  if(authChecked && !viewer && !DEV_MODE) return <div style={{minHeight:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:"#F0EDE6",fontFamily:"'Kanit',sans-serif",padding:"2rem"}}>
    <div style={{background:"#FAF8F5",borderRadius:20,padding:"2.5rem 2rem",boxShadow:"0 8px 40px rgba(0,0,0,0.10)",width:"100%",maxWidth:380,textAlign:"center"}}>
      <div style={{width:52,height:52,background:"#0D2B4E",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 1.25rem"}}>
        <div style={{width:28,height:28,background:"#B87A14",borderRadius:7}}/>
      </div>
      <div style={{fontSize:18,fontWeight:700,color:"#0D2B4E",marginBottom:6}}>แผนการเงินของคุณ</div>
      <div style={{fontSize:13,color:"#6A85A8",marginBottom:"1.5rem",lineHeight:1.6}}>กรุณาเข้าสู่ระบบด้วย Gmail ที่ตรงกับอีเมลที่ Advisor บันทึกไว้ให้คุณ เพื่อดูแผนการเงิน</div>
      <button onClick={loginAsClient} disabled={loggingIn} style={{width:"100%",padding:"13px",borderRadius:12,border:"1px solid rgba(13,43,78,0.16)",background:"white",fontFamily:"'Kanit',sans-serif",fontSize:15,fontWeight:500,color:"#0D2B4E",cursor:loggingIn?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,boxShadow:"0 1px 4px rgba(0,0,0,0.08)",opacity:loggingIn?0.7:1}}>
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.6 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.6-8 19.6-20 0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 19 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4c-7.7 0-14.3 4.5-17.7 10.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5L31.1 33.6C29.3 34.8 26.8 36 24 36c-5.2 0-9.6-3.5-11.2-8.2l-6.6 5.1C9.8 39.6 16.4 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.2-2.2 4-4 5.3l6.3 5.2c3.7-3.4 6-8.4 6-14.5 0-1.3-.1-2.7-.4-4z"/></svg>
        {loggingIn?"กำลังเข้าสู่ระบบ...":"เข้าสู่ระบบด้วย Google"}
      </button>
    </div>
  </div>;

  // ── Gate 2: signed in, but email doesn't match the client's saved email ──
  if(denied) return <div style={{minHeight:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:"#F0EDE6",fontFamily:"'Kanit',sans-serif",flexDirection:"column",gap:8,padding:"2rem"}}>
    <div style={{fontSize:32}}>🔒</div>
    <div style={{fontSize:16,fontWeight:600,color:"#111827",textAlign:"center"}}>อีเมลของคุณไม่ตรงกับลูกค้าในแผนนี้</div>
    <div style={{fontSize:13,color:"#9CA3AF",textAlign:"center"}}>เข้าสู่ระบบด้วย {viewer?.email} — กรุณาใช้อีเมลที่ Advisor บันทึกไว้ให้คุณ</div>
    <button onClick={()=>auth.signOut()} style={{fontSize:13,color:"#3B82F6",background:"none",border:"none",cursor:"pointer",fontFamily:"'Kanit',sans-serif",marginTop:8}}>ออกจากระบบ / เปลี่ยนบัญชี</button>
  </div>;

  if(loading) return <div style={{minHeight:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:"#F0EDE6",fontFamily:"'Kanit',sans-serif",flexDirection:"column",gap:12}}>
    <div style={{width:36,height:36,border:"3px solid #0D2B4E",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
    <div style={{fontSize:14,color:"#6B7280"}}>กำลังโหลดแผนการเงิน...</div>
    <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
  </div>;

  if(error) return <div style={{minHeight:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:"#F0EDE6",fontFamily:"'Kanit',sans-serif",flexDirection:"column",gap:8,padding:"2rem"}}>
    <div style={{fontSize:32}}>😕</div>
    <div style={{fontSize:16,fontWeight:600,color:"#111827"}}>{error}</div>
    <div style={{fontSize:13,color:"#9CA3AF",textAlign:"center"}}>กรุณาขอ Link ใหม่จาก Advisor ของคุณ</div>
  </div>;

  if(!D) return null;

  const mEq=r=>(r.freq==="yearly"?(r.amt||0)/12:(r.amt||0));
  const ti=(D.income||[]).reduce((s,r)=>s+mEq(r),0);
  const toFix=(D.fixed||[]).reduce((s,r)=>s+mEq(r),0);
  const toVar=(D.variable||[]).reduce((s,r)=>s+mEq(r),0);
  const to=toFix+toVar;
  const net=ti-(to+(D.savings||0));
  const annualIncome=ti*12;
  const {tax,topRate}=calcThaiTax(annualIncome);
  const taxPerMonth=tax/12;
  const topRatePct=Math.round(topRate*100);
  const bracketColor=topRate===0?"#10B981":topRate<=0.10?"#3B82F6":topRate<=0.20?"#F59E0B":topRate<=0.25?"#F97316":"#EF4444";
  const age=calcAge(D.dob);
  const retAge=D.retAge||60;
  const ytr=Math.max(0,(retAge-(age||0)));
  const needed=D.retNeeded||0;
  const prepFV=(D.retAssets||[]).reduce((s,a)=>{const pv=a.cv||0,r=(a.rr||0)/100;return s+pv*Math.pow(1+r,ytr);},0);
  const retGap=Math.max(0,needed-prepFV);
  const pctReady=needed>0?Math.min(100,Math.round(prepFV/needed*100)):0;
  const savedAt=D.updatedAt;
  const fmtDate=ts=>{if(!ts)return "";const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString("th-TH",{day:"2-digit",month:"short",year:"2-digit"});};

  // insurance analysis
  const ins=D.insurance||{};
  const hasLife=ins.life>0;
  const hasHealth=ins.health;
  const hasCritical=ins.critical>0;
  const hasIncome=ins.incomeProtect>0;

  const SectionLabel=({n,label})=><div style={{fontSize:9,fontWeight:600,color:"#6B7280",letterSpacing:".07em",textTransform:"uppercase",fontFamily:"'Kanit',sans-serif",padding:"4px 2px 2px"}}>{n} · {label}</div>;
  const Badge=({label,color,bg})=><div style={{fontSize:10,background:bg,color:color,padding:"3px 8px",borderRadius:20,fontFamily:"'Kanit',sans-serif",whiteSpace:"nowrap"}}>{label}</div>;

  return <div style={{minHeight:"100dvh",background:"#F0EDE6",fontFamily:"'Kanit',sans-serif"}}>
    {/* Top bar */}
    <div style={{background:"#0D2B4E",padding:"10px 16px 14px"}}>
      <div style={{fontSize:10,color:"rgba(255,255,255,.4)",marginBottom:1}}>จัดทำโดย Advisor</div>
      <div style={{fontSize:17,fontWeight:600,color:"white"}}>แผนการเงิน</div>
      <div style={{fontSize:12,color:"rgba(255,255,255,.55)"}}>{D.name||"ลูกค้า"}{age?` · อายุ ${age} ปี`:""}</div>
    </div>

    <div style={{padding:"10px 12px 24px",display:"flex",flexDirection:"column",gap:8}}>

      {/* 1. Cash Flow */}
      <SectionLabel n="1" label="กระแสเงินสด"/>
      <div style={{background:"#1F2937",borderRadius:14,padding:"14px 14px 10px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:10}}>
          <div>
            <div style={{fontSize:9,color:"rgba(255,255,255,.4)",marginBottom:2}}>รายรับ / เดือน</div>
            <div style={{fontSize:22,fontWeight:600,color:"white",lineHeight:1}}>{fmt(ti)} <span style={{fontSize:12,color:"rgba(255,255,255,.35)"}}>฿</span></div>
          </div>
          <button onClick={()=>setCfOpen(v=>!v)} style={{fontSize:11,color:"#93C5FD",background:"none",border:"none",cursor:"pointer",fontFamily:"'Kanit',sans-serif",display:"flex",alignItems:"center",gap:3}}>
            {cfOpen?"ย่อ ▲":"ดูรายการ ▼"}
          </button>
        </div>
        <div style={{display:"flex",gap:0}}>
          {[["รายจ่าย",fmt(to),"#FCA5A5"],["ออม/ลงทุน",fmt(D.savings||0),"#86EFAC"],["คงเหลือ",(net>=0?"+":"")+fmt(net),net>=0?"white":"#FCA5A5"]].map(([l,v,c],i,a)=>(
            <div key={i} style={{flex:1,borderRight:i<a.length-1?"0.5px solid rgba(255,255,255,.07)":"none",paddingRight:i<a.length-1?10:0,paddingLeft:i>0?10:0}}>
              <div style={{fontSize:9,color:"rgba(255,255,255,.35)"}}>{l}</div>
              <div style={{fontSize:13,fontWeight:600,color:c}}>{v}</div>
            </div>
          ))}
        </div>
        {cfOpen&&<div style={{marginTop:10,borderTop:"0.5px solid rgba(255,255,255,.07)",paddingTop:8}}>
          {(D.income||[]).length>0&&<>
            <div style={{fontSize:9,color:"rgba(255,255,255,.35)",marginBottom:4,letterSpacing:".05em"}}>รายรับ</div>
            {(D.income||[]).map((r,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"rgba(255,255,255,.7)",marginBottom:3}}><span>{r.lbl}</span><span>{fmt(mEq(r))} ฿</span></div>)}
          </>}
          {(D.fixed||[]).length>0&&<>
            <div style={{fontSize:9,color:"rgba(255,255,255,.35)",margin:"8px 0 4px",letterSpacing:".05em"}}>รายจ่ายประจำ</div>
            {(D.fixed||[]).map((r,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"rgba(255,255,255,.7)",marginBottom:3}}><span>{r.lbl}</span><span>{fmt(mEq(r))} ฿</span></div>)}
          </>}
          {(D.variable||[]).length>0&&<>
            <div style={{fontSize:9,color:"rgba(255,255,255,.35)",margin:"8px 0 4px",letterSpacing:".05em"}}>รายจ่ายผันแปร</div>
            {(D.variable||[]).map((r,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"rgba(255,255,255,.7)",marginBottom:3}}><span>{r.lbl}</span><span>{fmt(mEq(r))} ฿</span></div>)}
          </>}
        </div>}
      </div>

      {/* 2. Tax */}
      {ti>0&&<><SectionLabel n="2" label="ภาษีเงินได้"/>
      <div style={{background:"white",borderRadius:14,padding:"12px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:13,fontWeight:600,color:"#111827"}}>ภาษีที่ต้องจ่าย</div>
          <Badge label={topRatePct===0?"ไม่ถึงเกณฑ์":`เกณฑ์ ${topRatePct}%`} color={bracketColor} bg={bracketColor+"18"}/>
        </div>
        <div style={{display:"flex",gap:8}}>
          <div style={{flex:1,background:"#F9FAFB",borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontSize:9,color:"#9CA3AF"}}>ต่อปี</div>
            <div style={{fontSize:16,fontWeight:600,color:"#111827"}}>{fmt(tax)} ฿</div>
          </div>
          <div style={{flex:1,background:"#FFF7ED",borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontSize:9,color:"#9CA3AF"}}>เฉลี่ย / เดือน</div>
            <div style={{fontSize:16,fontWeight:600,color:"#EA580C"}}>{fmt(taxPerMonth)} ฿</div>
          </div>
        </div>
        <div style={{marginTop:6,fontSize:10,color:"#9CA3AF"}}>* คำนวณจากรายรับรวมต่อปี ยังไม่รวมค่าลดหย่อน</div>
      </div></>}

      {/* 3. Insurance */}
      <SectionLabel n="3" label="ความคุ้มครอง"/>
      <div style={{background:"white",borderRadius:14,padding:"12px 14px"}}>
        {[
          {label:"ประกันชีวิต",sub:hasLife?`ทุนประกัน ${fmt(ins.life)} ฿`:"ยังไม่มี",has:hasLife,icon:"🛡"},
          {label:"ประกันสุขภาพ",sub:hasHealth?"มี OPD + IPD":"ยังไม่มี",has:hasHealth,icon:"❤️"},
          {label:"ประกันโรคร้ายแรง",sub:hasCritical?`${fmt(ins.critical)} ฿`:"แนะนำ 1,000,000 ฿",has:hasCritical,icon:"🏥"},
          {label:"ประกันรายได้",sub:hasIncome?"มีแล้ว":"แนะนำ 80% ของรายได้",has:hasIncome,icon:"💰"},
        ].map(({label,sub,has,icon},i,a)=>(
          <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 0",borderBottom:i<a.length-1?"0.5px solid #F3F4F6":"none"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:28,height:28,borderRadius:8,background:has?"#F0FDF4":"#FEF2F2",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>{icon}</div>
              <div>
                <div style={{fontSize:12,fontWeight:500,color:"#111827"}}>{label}</div>
                <div style={{fontSize:10,color:has?"#9CA3AF":"#EF4444"}}>{sub}</div>
              </div>
            </div>
            <Badge label={has?"มีแล้ว":"ยังไม่มี"} color={has?"#166534":"#DC2626"} bg={has?"#DCFCE7":"#FEF2F2"}/>
          </div>
        ))}
      </div>

      {/* 4. Goals */}
      {((D.shortGoals||[]).length>0||(D.midGoals||[]).length>0)&&<>
        <SectionLabel n="4" label="เป้าหมายการเงิน"/>
        <div style={{background:"white",borderRadius:14,padding:"12px 14px"}}>
          {[...(D.shortGoals||[]),...(D.midGoals||[])].map((g,i,a)=>(
            <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 0",borderBottom:i<a.length-1?"0.5px solid #F3F4F6":"none"}}>
              <div>
                <div style={{fontSize:12,fontWeight:500,color:"#111827"}}>{g.n||"เป้าหมาย"}</div>
                {g.y&&<div style={{fontSize:10,color:"#9CA3AF"}}>ภายในปี {g.y}</div>}
              </div>
              <div style={{fontSize:13,fontWeight:600,color:"#111827"}}>{fmt(g.a||0)} ฿</div>
            </div>
          ))}
        </div>
      </>}

      {/* 5. Retirement */}
      <SectionLabel n="5" label="แผนเกษียณ"/>
      <div style={{background:"white",borderRadius:14,padding:"12px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div>
            <div style={{fontSize:9,color:"#9CA3AF"}}>เกษียณเมื่ออายุ</div>
            <div style={{fontSize:20,fontWeight:600,color:"#111827"}}>{retAge} ปี</div>
            {age&&<div style={{fontSize:10,color:"#6B7280"}}>อีก {ytr} ปี</div>}
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:9,color:"#9CA3AF"}}>เตรียมไว้แล้ว</div>
            <div style={{fontSize:20,fontWeight:600,color:"#111827"}}>{fmtM(prepFV)} ฿</div>
            {needed>0&&<div style={{fontSize:10,color:"#6B7280"}}>เป้าหมาย {fmtM(needed)} ฿</div>}
          </div>
        </div>
        {needed>0&&<>
          <div style={{height:5,background:"#F3F4F6",borderRadius:4,overflow:"hidden",marginBottom:4}}>
            <div style={{height:"100%",width:pctReady+"%",background:"#3B82F6",borderRadius:4}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <div style={{fontSize:9,color:"#9CA3AF"}}>{pctReady}% ของเป้าหมาย</div>
            {retGap>0&&<div style={{fontSize:9,color:"#EF4444"}}>ขาดอีก {fmtM(retGap)} ฿</div>}
          </div>
        </>}
      </div>

      {/* Footer */}
      <div style={{textAlign:"center",paddingTop:4}}>
        <div style={{fontSize:10,color:"#9CA3AF"}}>ข้อมูล ณ {fmtDate(savedAt)} · ดูได้อย่างเดียว</div>
      </div>

    </div>
  </div>;
}

        <div style={{width:52,height:52,background:C.navy,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 1.25rem"}}>

// ─── CLIENT LIST SCREEN ───────────────────────────────────────────────────
function ClientListScreen({user,onOpen,onNew,onLogout}) {
  const [clients,setClients]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState("");
  const [delConfirm,setDelConfirm]=useState(null);

  useEffect(()=>{
    const unsub=db.collection("advisors").doc(user.uid).collection("clients")
      .orderBy("updatedAt","desc")
      .onSnapshot(snap=>{
        setClients(snap.docs.map(d=>({id:d.id,...d.data()})));
        setLoading(false);
      },()=>setLoading(false));
    return ()=>unsub();
  },[user.uid]);

  const deleteClient=async(id)=>{
    await db.collection("advisors").doc(user.uid).collection("clients").doc(id).delete();
    setDelConfirm(null);
  };

  const filtered=clients.filter(c=>(c.name||"").toLowerCase().includes(search.toLowerCase())||(c.phone||"").includes(search));

  const calcAgeStr=dob=>{const a=calcAge(dob);return a?`${a} ปี`:"-";};
  const fmtDate=ts=>{if(!ts)return "-";const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString("th-TH",{day:"2-digit",month:"short",year:"2-digit"});};

  return (
    <div style={{height:"100dvh",minHeight:"-webkit-fill-available",background:"#EDE8E0",display:"flex",flexDirection:"column",fontFamily:"'Kanit',sans-serif",overflow:"hidden"}}>
      {/* Topbar */}
      <div style={{height:54,background:C.navy,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 1.25rem",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:26,height:26,background:C.gold,borderRadius:6,flexShrink:0}}/>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:"white",lineHeight:1.1}}>Financial Planning</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,.45)"}}>Advisor Dashboard</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <img src={user.photoURL||""} alt="" style={{width:30,height:30,borderRadius:"50%",border:"2px solid rgba(255,255,255,.2)"}} onError={e=>e.target.style.display="none"}/>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:12,fontWeight:600,color:"white",lineHeight:1.1}}>{user.displayName||"Advisor"}</div>
            <button onClick={onLogout} style={{fontSize:10,color:"rgba(255,255,255,.45)",background:"none",border:"none",cursor:"pointer",fontFamily:"'Kanit',sans-serif",padding:0}}>ออกจากระบบ</button>
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:"1.25rem"}}>
        {/* Header row */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem",flexWrap:"wrap",gap:".75rem"}}>
          <div>
            <div style={{fontSize:22,fontWeight:700,color:C.navy}}>รายชื่อลูกค้า</div>
            <div style={{fontSize:12,color:C.text3}}>{clients.length} คน</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 ค้นหาชื่อ / เบอร์โทร"
              style={{fontFamily:"'Kanit',sans-serif",fontSize:13,padding:"8px 12px",borderRadius:10,border:`1px solid ${C.border2}`,background:"white",outline:"none",width:200}}/>
            <button onClick={onNew} style={{padding:"9px 18px",borderRadius:10,background:C.navy,color:"white",border:"none",fontFamily:"'Kanit',sans-serif",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:16,lineHeight:1}}>＋</span> ลูกค้าใหม่
            </button>
          </div>
        </div>

        {/* Cards */}
        {loading&&<div style={{textAlign:"center",padding:"3rem",color:C.text3,fontSize:14}}>กำลังโหลด...</div>}
        {!loading&&filtered.length===0&&<div style={{textAlign:"center",padding:"3rem"}}>
          <div style={{fontSize:40,marginBottom:"1rem"}}>👤</div>
          <div style={{fontSize:15,fontWeight:600,color:C.navy,marginBottom:4}}>{clients.length===0?"ยังไม่มีลูกค้า":"ไม่พบลูกค้า"}</div>
          <div style={{fontSize:13,color:C.text3,marginBottom:"1.25rem"}}>{clients.length===0?"กดปุ่ม 'ลูกค้าใหม่' เพื่อเริ่มต้น":"ลองค้นหาด้วยคำอื่น"}</div>
          {clients.length===0&&<button onClick={onNew} style={{padding:"10px 24px",borderRadius:10,background:C.navy,color:"white",border:"none",fontFamily:"'Kanit',sans-serif",fontSize:14,fontWeight:600,cursor:"pointer"}}>＋ เพิ่มลูกค้าคนแรก</button>}
        </div>}

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:"1rem"}}>
          {filtered.map(c=>{
            const age=calcAgeStr(c.dob);
            const income=c.totIn?`${fmt(c.totIn)} ฿/เดือน`:"";
            const goal=c.retAssets?.length>0?"มีแผนเกษียณ":"";
            return (
              <div key={c.id} style={{background:"#FAF8F5",borderRadius:14,border:`0.5px solid rgba(0,0,0,0.08)`,padding:"1rem 1.125rem",cursor:"pointer",transition:"box-shadow .15s",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}
                onClick={()=>onOpen(c)} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,0.10)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="0 1px 4px rgba(0,0,0,0.05)"}>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:".625rem"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:38,height:38,borderRadius:"50%",background:C.navyLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>
                      {(c.name||"?")[0]}
                    </div>
                    <div>
                      <div style={{fontSize:15,fontWeight:700,color:C.navy,lineHeight:1.1}}>{c.name||"ไม่มีชื่อ"}</div>
                      <div style={{fontSize:11,color:C.text3,marginTop:1}}>{c.occ||""}</div>
                    </div>
                  </div>
                  <button onClick={e=>{e.stopPropagation();setDelConfirm(c.id);}} style={{width:26,height:26,borderRadius:6,background:"rgba(163,48,48,0.08)",border:"none",cursor:"pointer",fontSize:12,color:C.red,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 12px",marginBottom:".625rem"}}>
                  {[["📅","วันเกิด",c.dob?new Date(c.dob).toLocaleDateString("th-TH",{day:"2-digit",month:"short",year:"2-digit"}):"-"],
                    ["🎂","อายุ",age],
                    ["📞","เบอร์โทร",c.phone||"-"],
                    ["💰","รายได้/เดือน",income||"-"]].map(([ico,lbl,val],i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:5}}>
                      <span style={{fontSize:11}}>{ico}</span>
                      <div>
                        <div style={{fontSize:9,color:C.text3,lineHeight:1}}>{lbl}</div>
                        <div style={{fontSize:12,fontWeight:500,color:C.text,lineHeight:1.3}}>{val}</div>
                      </div>
                    </div>
                  ))}
                </div>
                {(c.retGap>0||goal)&&<div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  {c.retGap>0&&<span style={{fontSize:10,background:C.goldLight,color:C.amber,borderRadius:20,padding:"2px 8px",fontWeight:500}}>Gap เกษียณ {fmtM(c.retGap)} ฿</span>}
                  {goal&&<span style={{fontSize:10,background:C.tealLight,color:C.teal,borderRadius:20,padding:"2px 8px",fontWeight:500}}>{goal}</span>}
                </div>}
                <div style={{marginTop:".5rem",paddingTop:".5rem",borderTop:`0.5px solid ${C.border}`,fontSize:10,color:C.text3,display:"flex",justifyContent:"space-between"}}>
                  <span>แก้ไขล่าสุด {fmtDate(c.updatedAt)}</span>
                  <span style={{color:C.navy,fontWeight:600}}>เปิด →</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Delete confirm modal */}
      {delConfirm&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}} onClick={()=>setDelConfirm(null)}>
        <div style={{background:"white",borderRadius:16,padding:"1.5rem",width:300,textAlign:"center"}} onClick={e=>e.stopPropagation()}>
          <div style={{fontSize:32,marginBottom:".75rem"}}>🗑</div>
          <div style={{fontSize:15,fontWeight:700,color:C.navy,marginBottom:4}}>ลบข้อมูลลูกค้า?</div>
          <div style={{fontSize:12,color:C.text3,marginBottom:"1.25rem"}}>การกระทำนี้ไม่สามารถย้อนกลับได้</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setDelConfirm(null)} style={{flex:1,padding:"9px",borderRadius:10,border:`1px solid ${C.border2}`,background:"white",fontFamily:"'Kanit',sans-serif",fontSize:13,cursor:"pointer"}}>ยกเลิก</button>
            <button onClick={()=>deleteClient(delConfirm)} style={{flex:1,padding:"9px",borderRadius:10,border:"none",background:C.red,color:"white",fontFamily:"'Kanit',sans-serif",fontSize:13,fontWeight:600,cursor:"pointer"}}>ลบ</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

// ─── PAGE 10: TAX PLANNING ──────────────────────────────────────────────
function TaxInput({label,value,onChange,max,note,icon}) {
  const upd=v=>onChange(Math.min(max||Infinity,Math.max(0,v)));
  return (
    <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"0.5px solid #F0EDE8"}}>
      <div style={{width:28,height:28,background:"#F4F8FD",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{icon||"💰"}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13,color:C.navy,fontWeight:500,lineHeight:1.3}}>{label}</div>
        {note&&<div style={{fontSize:10,color:C.text3,marginTop:1}}>{note}</div>}
      </div>
      <div style={{width:130,flexShrink:0}}>
        <Input value={value} onChange={upd} suffix="฿"/>
      </div>
      {max&&<div style={{fontSize:10,color:"#9CA3AF",width:90,textAlign:"right",flexShrink:0}}>สูงสุด {fmtM(max)}</div>}
    </div>
  );
}

function TaxSection({title,color,children}) {
  return (
    <div style={{background:"white",borderRadius:16,padding:".875rem 1rem",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:".625rem",paddingBottom:".5rem",borderBottom:`2px solid ${color||C.navy}`}}>
        <div style={{width:4,height:16,borderRadius:2,background:color||C.navy,flexShrink:0}}/>
        <div style={{fontSize:13,fontWeight:700,color:C.navy}}>{title}</div>
      </div>
      {children}
    </div>
  );
}

function Page10({D,set,step}) {
  const {annualIncome,totIn}=useCalcs(D);
  const tx=D.tax||{};
  const upd=(k,v)=>set(p=>({...p,tax:{...p.tax,[k]:v}}));

  // ─ auto-derived from other pages ─
  const numChildren=D.children.length;
  const numChildren2=(D.children||[]).filter((_,i)=>i>=1).length; // 2nd+ born ≥2561 (assume all qualify for simplicity)

  // กลุ่ม 1 auto-calc
  const selfDeduct=60000;
  const spouseDeduct=tx.spouseDeduct?60000:0;
  const child1Deduct=numChildren>=1?30000:0;
  const child2Deduct=numChildren2*30000;
  const childDeduct=child1Deduct+child2Deduct;
  const parentDeduct=(tx.parentCount||0)*30000;
  const disabledDeduct=(tx.disabledCount||0)*60000;
  const maternityDeduct=Math.min(tx.maternityExp||0,60000);
  const group1=selfDeduct+spouseDeduct+childDeduct+parentDeduct+disabledDeduct+maternityDeduct;

  // กลุ่ม 2 insurance/savings caps
  const ssoD=Math.min(tx.sso||0,9000);
  const lifeInsD=Math.min(tx.lifeInsDeduct||0,100000);
  const healthInsD=Math.min(tx.healthInsDeduct||0,25000);
  const lifeHealthCap=Math.min(lifeInsD+healthInsD,100000);
  const parentHlthD=Math.min(tx.parentHealthIns||0,15000);
  const retireCap=500000;
  const rmfD=Math.min(tx.rmf||0,retireCap);
  const ssfD=Math.min(tx.ssf||0,300000);
  const pvdD=Math.min(tx.pvd||0,retireCap);
  const nsfD=Math.min(tx.nsf||0,30000);
  const annuityD=Math.min(tx.annuityIns||0,200000);
  const retireGroup=Math.min(rmfD+pvdD+nsfD+annuityD,retireCap);
  const group2=ssoD+lifeHealthCap+parentHlthD+ssfD+retireGroup;

  // กลุ่ม 3 donations (after deductions — simplified: use 10% of post-deduct income)
  const donationGenD=Math.min(tx.donationGeneral||0,annualIncome*0.1);
  const donationEduD=Math.min((tx.donationEdu||0)*2,annualIncome*0.1);
  const donationPartyD=Math.min(tx.donationParty||0,10000);
  const group3=donationGenD+donationEduD+donationPartyD;

  // กลุ่ม 4 stimulus
  const easyD=Math.min(tx.easyEReceipt||0,50000);
  const homeLoanD=Math.min(tx.homeLoanInterest||0,100000);
  const solarD=Math.min(tx.solarCell||0,200000);
  const newHouseD=Math.min(tx.newHouse||0,100000);
  const group4=easyD+homeLoanD+solarD+newHouseD;

  const totalDeduct=group1+group2+group3+group4;

  // standard expense deduction: 50% of income, max 100,000
  const expenseDeduct=Math.min(annualIncome*0.5,100000);
  const taxableIncome=Math.max(0,annualIncome-expenseDeduct-totalDeduct);
  const taxWithDeduct=calcThaiTax(taxableIncome).tax;
  const taxWithout=calcThaiTax(Math.max(0,annualIncome-expenseDeduct)).tax;
  const taxSaved=Math.max(0,taxWithout-taxWithDeduct);

  const pct=annualIncome>0?Math.round(totalDeduct/annualIncome*100):0;

  return (
    <div style={{background:"#F3F4F6",borderRadius:16,padding:"1.25rem",margin:"-0.25rem",display:"flex",flexDirection:"column",gap:"1rem",minHeight:0}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:11,fontWeight:600,color:"#3B82F6",letterSpacing:".08em",textTransform:"uppercase",marginBottom:3}}>STEP {(step||0)+1} / 10</div>
          <div style={{fontSize:26,fontWeight:700,color:"#111827",lineHeight:1.1,letterSpacing:"-.01em"}}>วางแผนภาษี <span style={{fontSize:14,color:"#9CA3AF",fontWeight:400}}>Tax Planning</span></div>
        </div>
        {/* Summary KPIs */}
        <div style={{display:"flex",gap:".625rem"}}>
          {[
            {lbl:"รายได้ทั้งปี",val:fmtM(annualIncome),col:C.navy3},
            {lbl:"ลดหย่อนรวม",val:fmtM(totalDeduct),col:C.gold},
            {lbl:"ภาษีก่อนลดหย่อน",val:fmtM(taxWithout),col:C.red},
            {lbl:"ประหยัดภาษีได้",val:fmtM(taxSaved),col:C.teal},
          ].map(({lbl,val,col})=>(
            <div key={lbl} style={{background:"white",borderRadius:12,padding:".5rem .75rem",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",minWidth:110,textAlign:"center"}}>
              <div style={{fontSize:9,color:C.text3,marginBottom:3,fontWeight:500,textTransform:"uppercase",letterSpacing:".05em"}}>{lbl}</div>
              <div style={{fontSize:15,fontWeight:700,color:col}}>{val}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 260px",gap:".875rem",alignItems:"start"}}>
        <div style={{display:"flex",flexDirection:"column",gap:".875rem"}}>

          {/* Group 1 */}
          <TaxSection title="1. ค่าลดหย่อนส่วนตัวและครอบครัว" color={C.navy3}>
            {/* Auto items */}
            <div style={{background:C.navyPale,borderRadius:10,padding:".625rem .75rem",marginBottom:".5rem"}}>
              <div style={{fontSize:10,fontWeight:600,color:C.navy3,marginBottom:4,letterSpacing:".04em",textTransform:"uppercase"}}>คำนวณอัตโนมัติจากข้อมูลลูกค้า</div>
              {[
                {lbl:"ค่าลดหย่อนส่วนตัว",val:selfDeduct},
                ...(numChildren>0?[{lbl:`บุตร ${numChildren} คน`,val:childDeduct}]:[]),
              ].map(({lbl,val})=>(
                <div key={lbl} style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.text2,padding:"2px 0"}}>
                  <span>{lbl}</span><span style={{fontWeight:600,color:C.navy}}>{fmt(val)} ฿</span>
                </div>
              ))}
            </div>
            {/* Manual */}
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"0.5px solid #F0EDE8"}}>
              <div style={{width:28,height:28,background:"#F4F8FD",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>💑</div>
              <div style={{flex:1,fontSize:13,color:C.navy,fontWeight:500}}>คู่สมรสไม่มีรายได้</div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>upd("spouseDeduct",true)} style={{padding:"5px 12px",borderRadius:8,border:`1px solid ${tx.spouseDeduct?"#3B82F6":"#E5E7EB"}`,background:tx.spouseDeduct?"#3B82F6":"white",color:tx.spouseDeduct?"white":"#6B7280",fontSize:12,cursor:"pointer",fontFamily:"'Kanit',sans-serif",fontWeight:tx.spouseDeduct?600:400}}>มี</button>
                <button onClick={()=>upd("spouseDeduct",false)} style={{padding:"5px 12px",borderRadius:8,border:`1px solid ${!tx.spouseDeduct?"#E5E7EB":"#E5E7EB"}`,background:!tx.spouseDeduct?"#F9FAFB":"white",color:!tx.spouseDeduct?"#1A1A1A":"#6B7280",fontSize:12,cursor:"pointer",fontFamily:"'Kanit',sans-serif",fontWeight:!tx.spouseDeduct?600:400}}>ไม่มี</button>
              </div>
              <div style={{fontSize:11,color:C.text3,width:90,textAlign:"right",flexShrink:0}}>{tx.spouseDeduct?"60,000 ฿":"—"}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"0.5px solid #F0EDE8"}}>
              <div style={{width:28,height:28,background:"#F4F8FD",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>👴</div>
              <div style={{flex:1,fontSize:13,color:C.navy,fontWeight:500}}>พ่อแม่ที่เลี้ยงดู <span style={{fontSize:10,color:C.text3}}>(สูงสุด 4 คน)</span></div>
              <div style={{display:"flex",gap:4}}>
                {[0,1,2,3,4].map(n=>(
                  <button key={n} onClick={()=>upd("parentCount",n)} style={{width:32,height:32,borderRadius:8,border:`1px solid ${(tx.parentCount||0)===n?"#3B82F6":"#E5E7EB"}`,background:(tx.parentCount||0)===n?"#3B82F6":"white",color:(tx.parentCount||0)===n?"white":"#6B7280",fontSize:13,cursor:"pointer",fontFamily:"'Kanit',sans-serif",fontWeight:600}}>{n}</button>
                ))}
              </div>
              <div style={{fontSize:11,color:C.text3,width:90,textAlign:"right",flexShrink:0}}>{parentDeduct>0?fmt(parentDeduct)+" ฿":"—"}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"0.5px solid #F0EDE8"}}>
              <div style={{width:28,height:28,background:"#F4F8FD",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>♿</div>
              <div style={{flex:1,fontSize:13,color:C.navy,fontWeight:500}}>อุปการะผู้พิการ/ทุพลภาพ</div>
              <div style={{display:"flex",gap:4}}>
                {[0,1,2,3].map(n=>(
                  <button key={n} onClick={()=>upd("disabledCount",n)} style={{width:32,height:32,borderRadius:8,border:`1px solid ${(tx.disabledCount||0)===n?"#3B82F6":"#E5E7EB"}`,background:(tx.disabledCount||0)===n?"#3B82F6":"white",color:(tx.disabledCount||0)===n?"white":"#6B7280",fontSize:13,cursor:"pointer",fontFamily:"'Kanit',sans-serif",fontWeight:600}}>{n}</button>
                ))}
              </div>
              <div style={{fontSize:11,color:C.text3,width:90,textAlign:"right",flexShrink:0}}>{disabledDeduct>0?fmt(disabledDeduct)+" ฿":"—"}</div>
            </div>
            <TaxInput label="ค่าฝากครรภ์และคลอดบุตร" icon="🤱" value={tx.maternityExp||0} onChange={v=>upd("maternityExp",v)} max={60000} note="ตามจ่ายจริง สูงสุด 60,000 / ครรภ์"/>
            <div style={{display:"flex",justifyContent:"flex-end",paddingTop:6,marginTop:4}}>
              <div style={{fontSize:13,fontWeight:700,color:C.navy}}>รวมกลุ่มที่ 1: <span style={{color:C.navy3}}>{fmt(group1)} ฿</span></div>
            </div>
          </TaxSection>

          {/* Group 2 */}
          <TaxSection title="2. ค่าลดหย่อนประกัน เงินออม และการลงทุน" color={C.gold}>
            <TaxInput label="เงินประกันสังคม" icon="🏛" value={tx.sso||0} onChange={v=>upd("sso",v)} max={9000} note="ตามจ่ายจริง สูงสุด 9,000"/>
            <TaxInput label="เบี้ยประกันชีวิต / สะสมทรัพย์" icon="🛡" value={tx.lifeInsDeduct||0} onChange={v=>upd("lifeInsDeduct",v)} max={100000} note="คุ้มครอง 10 ปีขึ้นไป สูงสุด 100,000"/>
            <TaxInput label="เบี้ยประกันสุขภาพ" icon="🏥" value={tx.healthInsDeduct||0} onChange={v=>upd("healthInsDeduct",v)} max={25000} note="รวมกับชีวิตต้องไม่เกิน 100,000 / ลดหย่อนสูงสุด 25,000"/>
            <TaxInput label="เบี้ยประกันสุขภาพพ่อแม่" icon="👨‍⚕️" value={tx.parentHealthIns||0} onChange={v=>upd("parentHealthIns",v)} max={15000} note="สูงสุด 15,000"/>
            <div style={{height:"0.5px",background:C.border,margin:"4px 0 8px"}}/>
            <div style={{fontSize:10,fontWeight:600,color:C.text3,textTransform:"uppercase",letterSpacing:".05em",marginBottom:4}}>กลุ่มเกษียณ (รวมกันไม่เกิน 500,000)</div>
            <TaxInput label="กองทุนรวม RMF" icon="📈" value={tx.rmf||0} onChange={v=>upd("rmf",v)} max={500000} note="30% ของรายได้ สูงสุด 500,000"/>

// ─── MAIN APP ────────────────────────────────────────────────────────────
const PAGES = [
  {content:Page1,panel:Panel1},{content:Page2,panel:Panel2},
  {content:Page6,panel:Panel6},{content:Page3,panel:Panel3},
  {content:Page4,panel:Panel4},{content:Page5,panel:Panel5},
  {content:Page7,panel:Panel7},{content:Page8,panel:Panel8},
  {content:Page10,panel:Panel10},{content:Page9,panel:Panel9},
];

// Step icons for collapsed sidebar
const STEP_ICONS=["🔺","👤","💳","💧","🛡","🎯","🏖","🎓","🧾","📋"];

function App() {
  // ── Auth & screen state ──
  const [authLoading,setAuthLoading]=useState(true);
  const [user,setUser]=useState(null);
  const [screen,setScreen]=useState("auth"); // auth | clients | planner
  const [currentClient,setCurrentClient]=useState(null); // {id,...clientData}

  // ── Planner state ──
  const [cur,setCur]=useState(0);
  const [D,setD]=useState(initState);
  const [drawerOpen,setDrawerOpen]=useState(false);
  const [sidebarExpanded,setSidebarExpanded]=useState(false);

  // ── Save state ──
  const [saving,setSaving]=useState(false);
  const [savedAt,setSavedAt]=useState(null);
  const [shareUrl,setShareUrl]=useState("");
  const [showShareToast,setShowShareToast]=useState(false);

  // ── Auth listener (with advisor whitelist check) ──
  const deniedRef=useRef(false);
  useEffect(()=>{
    if(DEV_MODE){
      setUser({displayName:"Dev User",email:"dev@local"});
      setAuthLoading(false);
      setScreen("clients");
      return;
    }
    const unsub=auth.onAuthStateChanged(async u=>{
      if(!u){
        setUser(null);
        setAuthLoading(false);
        if(deniedRef.current){deniedRef.current=false;return;} // keep "denied" screen, don't bounce to "auth"
        setScreen("auth");
        return;
      }
      const email=(u.email||"").trim().toLowerCase();
      try{
        const wl=await db.collection("approvedAdvisors").doc(email).get();
        if(!wl.exists){
          deniedRef.current=true;
          setScreen("denied");
          await auth.signOut();
          return;
        }
        setUser(u);
        setAuthLoading(false);
        setScreen("clients");
      }catch(e){
        // Whitelist check failed (rules/network) — fail closed, not open.
        deniedRef.current=true;
        setScreen("denied");
        await auth.signOut();
      }
    });
    return ()=>unsub();
  },[]);

  const logout=()=>{auth.signOut();setScreen("auth");setCurrentClient(null);};

  // ── Open existing client ──
  const openClient=(clientData)=>{
    setCurrentClient(clientData);
    // Merge saved data into initState (fill missing keys gracefully)
    setD({...initState(),...clientData});
    setCur(0);
    setScreen("planner");
    setSavedAt(clientData.updatedAt?clientData.updatedAt.toDate?clientData.updatedAt.toDate():new Date(clientData.updatedAt):null);
    setShareUrl(`${window.location.origin}${window.location.pathname}?share=${user.uid}_${clientData.id}`);
  };

  // ── New client ──
  const newClient=()=>{
    setCurrentClient(null);
    setD(initState());
    setCur(0);
    setScreen("planner");
    setSavedAt(null);
    setShareUrl("");
  };

  // ── Save to Firestore ──
  const saveClient=async()=>{
    if(!user) return;
    setSaving(true);
    try {
      const snapshot={
        ...D,
        updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
        advisorUid:user.uid,
        totIn:D.income?.reduce((s,r)=>s+(r.freq==="yearly"?(r.amt||0)/12:(r.amt||0)),0)||0,
        retGap:Math.max(0,(()=>{
          const ca2=calcAge(D.dob)||35;
          const ytr2=Math.max(0,(D.retAge||60)-ca2);
          const yir2=Math.max(0,(D.lifeExp||85)-(D.retAge||60));
          const inf=(D.infl||3)/100,ra2=(D.retAfter||3)/100;
          const fm2=(D.monthlyNeed||0)*Math.pow(1+inf,ytr2);
          let needed2=0;if(ra2>0&&yir2>0) needed2=fm2*12*(1-Math.pow(1+ra2,-yir2))/ra2;
          let prepFV2=0;(D.retAssets||[]).forEach(a=>{prepFV2+=(a.cv||0)*Math.pow(1+(a.rr||0)/100,ytr2);});
          return needed2-prepFV2;
        })()),
      };
      let docRef;
      if(currentClient?.id){
        docRef=db.collection("advisors").doc(user.uid).collection("clients").doc(currentClient.id);
        await docRef.set(snapshot,{merge:true});
      } else {
        docRef=await db.collection("advisors").doc(user.uid).collection("clients").add(snapshot);
        setCurrentClient({id:docRef.id,...snapshot});
        setShareUrl(`${window.location.origin}${window.location.pathname}?share=${user.uid}_${docRef.id}`);
      }
      setSavedAt(new Date());
    } catch(e){console.error(e);}
    setSaving(false);
  };

  // ── Copy share URL ──
  const copyShare=()=>{
    if(!shareUrl){alert("กรุณา Save ก่อนแชร์");return;}
    if(!D.email){alert("กรุณากรอกอีเมลลูกค้าในหน้า 'ข้อมูลลูกค้า' ก่อนแชร์ — ลูกค้าต้อง Login Google ด้วยอีเมลนี้เพื่อดูแผน");return;}
    navigator.clipboard.writeText(shareUrl).then(()=>{setShowShareToast(true);setTimeout(()=>setShowShareToast(false),2500);});
  };

  const goNext=()=>{if(cur===9){openPDF(D);return;}setCur(c=>Math.min(9,c+1));};
  const goBack=()=>setCur(c=>Math.max(0,c-1));
  const jumpTo=useCallback((i)=>{setCur(i);setDrawerOpen(false);},[]);
  const PageContent=PAGES[cur].content;
  const PagePanel=PAGES[cur].panel;
  const isCF=cur===2;

  // ── Render screens ──
  if(SHARE_MODE) return <ShareViewScreen/>;
  if(authLoading) return <div style={{height:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:"#EDE8E0",fontFamily:"'Kanit',sans-serif",color:C.text3,fontSize:14}}>กำลังโหลด...</div>;
  if(screen==="auth") return <AuthScreen onLogin={()=>{}}/>;
  if(screen==="denied") return <DeniedScreen onBack={()=>setScreen("auth")}/>;
  if(screen==="clients") return <ClientListScreen user={user} onOpen={openClient} onNew={newClient} onLogout={logout}/>;

  // ── Planner screen ──
  const fmtSaved=savedAt?savedAt.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"}):"";

  return (
    <div style={{...s.app,background:isCF?"#E8EAF0":"#EDE8E0"}}>
      <style>{`
        .fp-sidebar-full{display:flex!important}
        .fp-hamburger{display:none!important}
        .fp-drawer-overlay{display:none!important}
        @media(max-width:1024px){
          .fp-sidebar-full{display:none!important}
          .fp-hamburger{display:flex!important}
          .fp-drawer-overlay{position:fixed;inset:0;z-index:100;display:flex!important}
        }
        .fp-step-item:hover{background:rgba(255,255,255,0.07)!important}
        .fp-sidebar-scroll::-webkit-scrollbar{width:3px}
        .fp-sidebar-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}
        .fp-save-btn:hover{background:rgba(59,130,246,0.15)!important}
        .fp-share-btn:hover{background:rgba(14,110,85,0.12)!important}
      `}</style>

      {/* Share toast */}
      {showShareToast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:C.teal,color:"white",borderRadius:10,padding:"10px 20px",fontSize:13,fontWeight:500,zIndex:9999,boxShadow:"0 4px 16px rgba(0,0,0,0.2)"}}>✅ คัดลอก Share Link แล้ว!</div>}

      {/* Topbar */}
      <div style={{height:50,background:C.navy,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 1rem",flexShrink:0,gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={()=>setScreen("clients")} style={{background:"rgba(255,255,255,.08)",border:"none",borderRadius:7,padding:"5px 10px",color:"rgba(255,255,255,.7)",fontFamily:"'Kanit',sans-serif",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>‹ ลูกค้า</button>
          <div style={{width:1,height:20,background:"rgba(255,255,255,.12)"}}/>
          <div style={{width:22,height:22,background:C.gold,borderRadius:5,flexShrink:0}}/>
          <span style={{fontSize:13,fontWeight:700,color:"white"}}>{D.name||"ลูกค้าใหม่"}</span>
          {savedAt&&<span style={{fontSize:10,color:"rgba(255,255,255,.35)"}}>บันทึกเวลา {fmtSaved}</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <img src={user?.photoURL||""} alt="" style={{width:26,height:26,borderRadius:"50%",border:"1.5px solid rgba(255,255,255,.2)"}} onError={e=>e.target.style.display="none"}/>
          <span style={{fontSize:11,color:"rgba(255,255,255,.5)"}}>{user?.displayName?.split(" ")[0]||""}</span>
        </div>
      </div>


      {/* ── BODY ── */}
      <div style={s.body}>

        {/* FULL SIDEBAR — desktop */}
        <div className="fp-sidebar-full" style={{...s.sidebar,width:sidebarExpanded?248:64}}>

          {/* Toggle expand button */}
          <button onClick={()=>setSidebarExpanded(v=>!v)} style={{height:48,display:"flex",alignItems:"center",justifyContent:sidebarExpanded?"flex-end":"center",padding:sidebarExpanded?"0 12px":"0",border:"none",background:"transparent",cursor:"pointer",borderBottom:"0.5px solid rgba(255,255,255,0.07)",flexShrink:0,transition:"all .25s"}}>
            <div style={{width:28,height:28,borderRadius:8,background:"rgba(255,255,255,.07)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"rgba(255,255,255,.5)",transition:"transform .25s",transform:sidebarExpanded?"rotate(180deg)":"rotate(0deg)"}}>›</div>
          </button>

          {/* Pyramid — only when expanded */}
          {sidebarExpanded&&<div style={s.pyrWrap}>
            <div style={{fontSize:9,fontWeight:600,letterSpacing:".1em",color:"rgba(255,255,255,.3)",textTransform:"uppercase",marginBottom:1}}>Financial Planning</div>
            <div style={{fontSize:15,fontWeight:700,color:"white",marginBottom:".5rem"}}>พีระมิดการเงิน</div>
            <SidebarPyramid step={cur}/>
          </div>}

          {/* Step list */}
          <div className="fp-sidebar-scroll" style={{...s.stepsSection,overflowX:"hidden"}}>
            {!sidebarExpanded&&<div style={{fontSize:8,fontWeight:600,color:"rgba(255,255,255,.25)",textTransform:"uppercase",letterSpacing:".08em",textAlign:"center",padding:"4px 0 6px"}}>STEPS</div>}
            {sidebarExpanded&&<div style={{fontSize:9,fontWeight:600,color:"rgba(255,255,255,.3)",textTransform:"uppercase",letterSpacing:".08em",padding:"0 .25rem",marginBottom:4}}>ขั้นตอน</div>}
            {STEPS.map((step,i)=>{
              const isActive=i===cur, isDone=i<cur;
              return <div key={i} className="fp-step-item" onClick={()=>jumpTo(i)}
                style={{...s.stepItem,background:isActive?"rgba(212,148,26,.18)":"transparent",justifyContent:sidebarExpanded?"flex-start":"center",padding:sidebarExpanded?"8px 10px":"8px 0"}}>
                <div style={{...s.stepNum,background:isActive?"#D4941A":isDone?"rgba(94,201,165,.15)":"rgba(255,255,255,.08)",color:isActive?"#1A1A1A":isDone?"#5EC9A5":"rgba(255,255,255,.4)",fontSize:isActive||isDone?11:14,flexShrink:0}}>
                  {isDone?"✓":sidebarExpanded?(i+1):STEP_ICONS[i]}
                </div>
                {sidebarExpanded&&<div style={{display:"flex",flexDirection:"column",lineHeight:1.3,overflow:"hidden"}}>
                  <span style={{fontSize:13,fontWeight:isActive?600:400,color:isActive?"white":"rgba(255,255,255,.65)",whiteSpace:"nowrap"}}>{step.n}</span>
                  <span style={{fontSize:10,color:"rgba(255,255,255,.3)",whiteSpace:"nowrap"}}>{step.e}</span>
                </div>}
              </div>;
            })}
          </div>
        </div>

        {/* DRAWER OVERLAY — iPad */}
        {drawerOpen&&<div className="fp-drawer-overlay" onClick={()=>setDrawerOpen(false)}>
          <div onClick={e=>e.stopPropagation()} style={{width:260,background:"#2B2D31",height:"100%",display:"flex",flexDirection:"column",boxShadow:"4px 0 24px rgba(0,0,0,0.3)",overflow:"hidden"}}>
            <div style={{padding:"1rem",borderBottom:"0.5px solid rgba(255,255,255,.07)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{fontSize:13,fontWeight:700,color:"white"}}>ขั้นตอน</div>
              <button onClick={()=>setDrawerOpen(false)} style={{border:"none",background:"rgba(255,255,255,.08)",borderRadius:6,width:28,height:28,cursor:"pointer",fontSize:14,color:"rgba(255,255,255,.6)"}}>✕</button>
            </div>
            <div style={{padding:".5rem .625rem",overflowY:"auto",flex:1}}>
              <SidebarPyramid step={cur}/>
              <div style={{height:"0.5px",background:"rgba(255,255,255,.07)",margin:".5rem 0"}}/>
              {STEPS.map((step,i)=>{
                const isActive=i===cur,isDone=i<cur;
                return <div key={i} onClick={()=>jumpTo(i)} style={{...s.stepItem,background:isActive?"rgba(212,148,26,.18)":"transparent"}}>
                  <div style={{...s.stepNum,background:isActive?"#D4941A":isDone?"rgba(94,201,165,.15)":"rgba(255,255,255,.08)",color:isActive?"#1A1A1A":isDone?"#5EC9A5":"rgba(255,255,255,.4)"}}>{isDone?"✓":(i+1)}</div>
                  <div style={{display:"flex",flexDirection:"column",lineHeight:1.3}}>
                    <span style={{fontSize:13,fontWeight:isActive?600:400,color:isActive?"white":"rgba(255,255,255,.7)"}}>{step.n}</span>
                    <span style={{fontSize:11,color:"rgba(255,255,255,.3)"}}>{step.e}</span>
                  </div>
                </div>;
              })}
            </div>
          </div>
        </div>}

        {/* MAIN CONTENT */}
        <div style={s.mainWrap}>
          <div style={s.scrollArea}>
            <div style={{...s.contentCol}}>
              <PageContent D={D} set={setD} onJump={jumpTo} step={cur}/>
            </div>
            {PagePanel!==Panel1&&PagePanel!==Panel2&&PagePanel!==Panel3&&PagePanel!==Panel4&&PagePanel!==Panel5&&PagePanel!==Panel6&&PagePanel!==Panel7&&PagePanel!==Panel8&&PagePanel!==Panel9&&PagePanel!==Panel10&&<div style={s.panelCol}>
              <PagePanel D={D}/>
            </div>}
          </div>
          <div style={{...s.bottomNav}}>
            <button onClick={goBack} style={{...s.navBtn,padding:"6px 16px",visibility:cur===0?"hidden":"visible"}}>‹ ย้อนกลับ</button>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <button className="fp-save-btn" onClick={saveClient} disabled={saving} style={{padding:"7px 14px",borderRadius:10,fontSize:13,fontFamily:"'Kanit',sans-serif",fontWeight:600,cursor:saving?"not-allowed":"pointer",border:`1px solid rgba(59,130,246,0.3)`,background:"rgba(59,130,246,0.08)",color:"#1E5499",display:"flex",alignItems:"center",gap:5,opacity:saving?0.7:1,transition:"background .15s"}}>
                {saving?"⏳":"💾"} {saving?"กำลังบันทึก...":"บันทึก"}
              </button>
              <button className="fp-share-btn" onClick={copyShare} style={{padding:"7px 14px",borderRadius:10,fontSize:13,fontFamily:"'Kanit',sans-serif",fontWeight:600,cursor:"pointer",border:`1px solid rgba(14,110,85,0.25)`,background:"rgba(14,110,85,0.07)",color:C.teal,display:"flex",alignItems:"center",gap:5,transition:"background .15s"}}>
                🔗 แชร์
              </button>
            </div>
            <div style={{flex:1,height:5,background:"rgba(0,0,0,0.07)",borderRadius:3,overflow:"hidden",maxWidth:240}}>
              <div style={{height:"100%",width:`${((cur+1)/10)*100}%`,background:"#3B82F6",borderRadius:3,transition:"width .3s ease"}}/>
            </div>
            <button onClick={goNext} style={{...s.navBtnPrimary,padding:"7px 20px"}}>{cur===9?"🖨 Export PDF":"ถัดไป ›"}</button>
          </div>
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>

(function(){
  var src = document.getElementById("app-script").textContent;
  var out = Babel.transform(src, {
    presets: [["react", { runtime: "classic" }]]
  }).code;
  var s = document.createElement("script");
  s.textContent = out;
  document.body.appendChild(s);
})();
</script>
</body>
